global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:

  - job_name: "tadr-controller"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    # On Linux replace host.docker.internal with your host IP, e.g. 172.17.0.1

  - job_name: "prometheus-self"
    static_configs:
      - targets: ["localhost:9090"]
